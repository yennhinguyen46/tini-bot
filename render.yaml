services:
  - type: worker
    name: tini-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BOT_NAME
        value: Tí Nị
      - key: MAX_HISTORY
        value: "20"
